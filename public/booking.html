<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking Portal — Universal Logistics & International</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  body{background:#f3f3f0; padding:0;}
  .nav-links{display:flex; gap:16px; align-items:center;}
  .book-body{max-width:760px; margin:0 auto; padding:28px 20px;}
  .book-card{
    background:#fff; border-radius:12px; padding:24px 26px; margin-bottom:26px;
    box-shadow:0 1px 8px rgba(0,0,0,.08);
  }
  .book-card h2{font-family:"Playfair Display", serif; color:var(--blue); margin:0 0 4px;}
  .book-card .sub{color:var(--muted); font-size:13px; margin-bottom:18px;}
  .book-card fieldset{border:1px solid #eee; border-radius:8px; margin-bottom:14px; padding:12px 14px;}
  .book-card legend{font-size:12.5px; font-weight:700; color:var(--blue); padding:0 6px;}
  .book-card label{display:block; font-size:12px; color:var(--muted); margin:8px 0 3px;}
  .book-card input, .book-card textarea{
    width:100%; padding:9px 11px; border:1px solid #ccc; border-radius:7px;
    font-size:13.5px; font-family:inherit;
  }
  .row2{display:flex; gap:10px;}
  .row2 > div{flex:1;}
  #submitBtn{
    width:100%; margin-top:10px; padding:12px; background:var(--blue); color:#fff;
    border:none; border-radius:8px; font-weight:700; font-size:14px; cursor:pointer;
  }
  #submitBtn:hover{background:#092a4d;}
  #formMsg{font-size:12.5px; margin-top:10px; padding:8px 10px; border-radius:6px; display:none;}
  #formMsg.success{background:#d4f5df; color:#1a7d43; display:block;}
  #formMsg.error{background:#fdeaea; color:#9c2b2b; display:block;}
  .locked-note{
    background:#fff3cd; color:#8a6300; font-size:12.5px; padding:10px 12px;
    border-radius:7px; margin-bottom:14px;
  }
  .status-pill{display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700;}
  .status-Pending{background:#fff3cd; color:#8a6300;}
  .status-Confirmed{background:#d4f5df; color:#1a7d43;}
  .status-Shipped{background:#dbe9ff; color:var(--blue);}
  .status-Cancelled{background:#fdeaea; color:#9c2b2b;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">UNIVERSAL <span>LOGISTICS</span></div>
  <div class="userinfo">
    <span id="userName"></span>
    <button id="logoutBtn">Logout</button>
  </div>
</div>

<div class="book-body">

  <div class="book-card">
    <h2 id="formTitle">New Booking Request</h2>
    <div class="sub">Apni shipment ki tafseelat bharein — hamari team review kar ke confirm karegi.</div>
    <div class="locked-note" id="lockedNote" style="display:none;"></div>

    <fieldset>
      <legend>Sender (Aap)</legend>
      <label>Naam</label>
      <input type="text" id="shipperName">
      <label>Address</label>
      <textarea id="shipperAddress"></textarea>
      <div class="row2">
        <div><label>City</label><input type="text" id="shipperCity"></div>
        <div><label>Zip Code</label><input type="text" id="shipperZip"></div>
      </div>
      <div class="row2">
        <div><label>Country</label><input type="text" id="shipperCountry" value="Pakistan"></div>
        <div><label>Phone</label><input type="text" id="shipperPhone"></div>
      </div>
    </fieldset>

    <fieldset>
      <legend>Receiver</legend>
      <label>Naam</label>
      <input type="text" id="consigneeName">
      <label>Address</label>
      <textarea id="consigneeAddress"></textarea>
      <div class="row2">
        <div><label>City</label><input type="text" id="consigneeCity"></div>
        <div><label>Zip Code</label><input type="text" id="consigneeZip"></div>
      </div>
      <div class="row2">
        <div><label>Country</label><input type="text" id="consigneeCountry"></div>
        <div><label>Phone</label><input type="text" id="consigneePhone"></div>
      </div>
    </fieldset>

    <fieldset>
      <legend>Package Details</legend>
      <div class="row2">
        <div><label>Pieces</label><input type="text" id="pieces"></div>
        <div><label>Weight (KG)</label><input type="text" id="weight"></div>
      </div>
      <label>Dimension (L*W*H, comma se separate multiple pieces ke liye)</label>
      <textarea id="dimension" placeholder="33*40*33, 33*40*33"></textarea>
      <label>Product Detail (kya bhej rahe hain)</label>
      <input type="text" id="productDetail">
      <label>Comments</label>
      <textarea id="comments"></textarea>
    </fieldset>

    <button id="submitBtn" type="button">Submit Booking</button>
    <div id="formMsg"></div>
  </div>

  <div class="book-card">
    <h2 style="font-size:18px;">My Bookings</h2>
    <div id="listWrap"><div class="empty-state">Loading...</div></div>
  </div>

</div>

<script>
let editingId = new URLSearchParams(window.location.search).get("id");
let editingLocked = false;

const fieldIds = [
  "shipperName","shipperAddress","shipperCity","shipperZip","shipperCountry","shipperPhone",
  "consigneeName","consigneeAddress","consigneeCity","consigneeZip","consigneeCountry","consigneePhone",
  "pieces","weight","dimension","productDetail","comments"
];

function getValues(){
  const v = {};
  fieldIds.forEach(id=>{ const el = document.getElementById(id); v[id] = el ? el.value : ""; });
  return v;
}
function setValues(v){
  fieldIds.forEach(id=>{ const el = document.getElementById(id); if(el && v[id] !== undefined) el.value = v[id]; });
}
function setFormDisabled(disabled){
  fieldIds.forEach(id=>{ const el = document.getElementById(id); if(el) el.disabled = disabled; });
  document.getElementById("submitBtn").style.display = disabled ? "none" : "block";
}

async function loadUser(){
  const res = await fetch("/api/auth/me");
  if(!res.ok){ window.location.href = "/login.html"; return null; }
  const data = await res.json();
  if(data.user.role === "admin"){ window.location.href = "/dashboard.html"; return null; }
  document.getElementById("userName").textContent = data.user.name;
  return data.user;
}

async function loadEditingBooking(){
  if(!editingId) return;
  const res = await fetch(`/api/shipments/${editingId}`);
  if(!res.ok) return;
  const data = await res.json();
  if(data.form) setValues(data.form);

  if(data.status !== "Pending"){
    editingLocked = true;
    document.getElementById("formTitle").textContent = "Booking Details";
    document.getElementById("lockedNote").style.display = "block";
    document.getElementById("lockedNote").textContent =
      `Ye booking "${data.status}" ho chuki hai, is liye ab edit nahi ho sakti. Koi tabdeeli chahiye to hamari team se rabta karein.`;
    setFormDisabled(true);
  } else {
    document.getElementById("formTitle").textContent = "Edit Booking";
  }
}

async function loadMyBookings(){
  const res = await fetch("/api/shipments");
  const data = await res.json();
  const wrap = document.getElementById("listWrap");

  if(!data.shipments || data.shipments.length === 0){
    wrap.innerHTML = '<div class="empty-state">Abhi tak koi booking nahi ki.</div>';
    return;
  }

  const rows = data.shipments.map(s => `
    <tr>
      <td>${s.awbnum || "(pending)"}</td>
      <td>${escapeHtml(s.consigneeName || "-")}</td>
      <td><span class="status-pill status-${s.status}">${s.status}</span></td>
      <td>${new Date(s.updated_at).toLocaleDateString()}</td>
      <td>
        ${s.status === "Pending" ? `<a class="act-edit" href="/booking.html?id=${s.id}">Edit</a>` : `<a class="act-print" href="/print.html?id=${s.id}" target="_blank">View/Print</a>`}
      </td>
    </tr>
  `).join("");

  wrap.innerHTML = `
    <table class="ship-table">
      <tr><th>AWB #</th><th>Receiver</th><th>Status</th><th>Last Updated</th><th>Actions</th></tr>
      ${rows}
    </table>
  `;
}

function escapeHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

document.getElementById("submitBtn").addEventListener("click", async ()=>{
  const msg = document.getElementById("formMsg");
  msg.className = "";
  const payload = { form: getValues(), products: [], showTnc: true, showInvoice: true, copies: "1" };

  try{
    let res;
    if(editingId){
      res = await fetch(`/api/shipments/${editingId}`, {
        method:"PUT", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload)
      });
    } else {
      res = await fetch(`/api/shipments`, {
        method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload)
      });
    }
    const data = await res.json();
    if(!res.ok){ msg.textContent = data.error || "Booking submit nahi ho saki"; msg.className = "error"; return; }

    msg.textContent = "Booking submit ho gayi! Hamari team jald review karegi.";
    msg.className = "success";
    setTimeout(()=> window.location.href = "/booking.html", 1200);
  }catch(err){
    msg.textContent = "Network error";
    msg.className = "error";
  }
});

document.getElementById("logoutBtn").addEventListener("click", async ()=>{
  await fetch("/api/auth/logout", { method:"POST" });
  window.location.href = "/login.html";
});

(async function init(){
  const user = await loadUser();
  if(!user) return;
  await loadEditingBooking();
  await loadMyBookings();
})();
</script>
</body>
</html>
