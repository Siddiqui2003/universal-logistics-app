<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Customers — Universal Logistics & International</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  body{background:#eef0ed;}
  .hero-topbar{
    background:linear-gradient(120deg, var(--blue) 0%, #123a63 55%, #0a2340 100%);
    position:relative; overflow:hidden;
  }
  .hero-topbar::before{
    content:""; position:absolute; inset:0;
    background:radial-gradient(circle at 85% -20%, rgba(200,149,44,0.35), transparent 55%);
  }
  .hero-inner{
    position:relative; max-width:1100px; margin:0 auto; padding:18px 24px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .hero-brand{display:flex; align-items:center; gap:14px;}
  .hero-logo{
    width:52px; height:52px; border-radius:12px; overflow:hidden;
    background:#fff; display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  .hero-logo img{width:100%; height:100%; object-fit:cover;}
  .hero-title{color:#fff;}
  .hero-title .name{font-family:"Playfair Display", serif; font-weight:800; font-size:20px;}
  .hero-title .tag{font-size:11.5px; color:#cfe0f5; margin-top:1px;}
  .hero-right{display:flex; align-items:center; gap:18px;}
  .hero-nav a{
    color:#e8eefc; text-decoration:none; font-size:13px; font-weight:600;
    padding:8px 14px; border-radius:7px; border:1px solid rgba(255,255,255,.25);
  }
  .hero-nav a:hover{background:rgba(255,255,255,.12);}
  .hero-user{display:flex; align-items:center; gap:12px;}
  .hero-user .avatar{
    width:34px; height:34px; border-radius:50%; background:var(--orange); color:#1c1300;
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px;
  }
  .hero-user span{color:#fff; font-size:13px; font-weight:600;}
  .hero-user button{
    background:rgba(255,255,255,.14); color:#fff; border:1px solid rgba(255,255,255,.3);
    padding:8px 14px; border-radius:7px; font-size:12.5px; font-weight:600; cursor:pointer;
  }
  .hero-user button:hover{background:rgba(255,255,255,.24);}
  .dash-body{max-width:1100px; margin:0 auto; padding:26px 24px 40px;}
  .add-card{
    background:#fff; border-radius:12px; padding:20px 22px; margin-bottom:22px;
    box-shadow:0 6px 20px rgba(20,30,50,.10);
  }
  .add-card h3{margin:0 0 14px; font-family:"Playfair Display", serif; color:var(--blue);}
  .add-row{display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;}
  .add-row > div{flex:1; min-width:180px;}
  .add-row label{display:block; font-size:12px; color:var(--muted); margin-bottom:4px;}
  .add-row input{width:100%; padding:9px 11px; border:1px solid #ccc; border-radius:7px; font-size:13.5px; font-family:inherit;}
  .add-row button{
    padding:10px 20px; background:var(--blue); color:#fff; border:none; border-radius:7px;
    font-weight:700; font-size:13.5px; cursor:pointer; white-space:nowrap;
  }
  .add-row button:hover{background:#092a4d;}
  .msg{font-size:12.5px; margin-top:10px; display:none; padding:8px 10px; border-radius:6px;}
  .msg.error{background:#fdeaea; color:#9c2b2b; display:block;}
  .msg.success{background:#d4f5df; color:#1a7d43; display:block;}
  .dash-head h2{font-family:"Playfair Display", serif; margin:0; color:var(--ink); font-size:21px;}
  .ship-table{border-top:none;}
  .ship-table th{background:#f7f7f5;}
  .ship-table tr:not(:first-child):hover td{background:#fbfbfa;}
</style>
</head>
<body>

<div class="hero-topbar">
  <div class="hero-inner">
    <div class="hero-brand">
      <div class="hero-logo"><img id="logoImg" alt="Universal Logistics & International"></div>
      <div class="hero-title">
        <div class="name">Universal Logistics &amp; International</div>
        <div class="tag">Manage Customers</div>
      </div>
    </div>
    <div class="hero-right">
      <div class="hero-nav"><a href="/dashboard.html">&larr; All Shipments</a></div>
      <div class="hero-user">
        <div class="avatar" id="avatarLetter"></div>
        <span id="userName"></span>
        <button id="logoutBtn">Logout</button>
      </div>
    </div>
  </div>
</div>

<div class="dash-body">
  <div class="add-card">
    <h3>+ Add New Customer</h3>
    <div class="add-row">
      <div><label>Full Name</label><input type="text" id="newName"></div>
      <div><label>Email</label><input type="email" id="newEmail"></div>
      <div><label>Password</label><input type="password" id="newPassword" placeholder="Kam se kam 6 characters"></div>
      <button id="addBtn">+ Add Customer</button>
    </div>
    <div class="msg" id="msgBox"></div>
  </div>

  <div class="dash-head">
    <h2>Customers (<span id="custCount">0</span>)</h2>
  </div>
  <div id="listWrap">
    <div class="empty-state">Loading...</div>
  </div>
</div>

<script src="/js/templates.js"></script>
<script>
document.getElementById("logoImg").src = LOGO_DATA_URI;

async function loadUser(){
  const res = await fetch("/api/auth/me");
  if(!res.ok){ window.location.href = "/login.html"; return null; }
  const data = await res.json();
  if(data.user.role !== "admin"){ window.location.href = "/my-shipments.html"; return null; }
  document.getElementById("userName").textContent = data.user.name;
  document.getElementById("avatarLetter").textContent = data.user.name.charAt(0).toUpperCase();
  return data.user;
}

async function loadCustomers(){
  const res = await fetch("/api/admin/customers");
  const data = await res.json();
  const wrap = document.getElementById("listWrap");
  document.getElementById("custCount").textContent = (data.customers || []).length;

  if(!data.customers || data.customers.length === 0){
    wrap.innerHTML = '<div class="empty-state">Abhi tak koi customer add nahi hua. Upar form se pehla customer add karein.</div>';
    return;
  }

  const rows = data.customers.map(c => `
    <tr>
      <td>${escapeHtml(c.name)}</td>
      <td>${escapeHtml(c.email)}</td>
      <td>${new Date(c.created_at).toLocaleDateString()}</td>
      <td>
        <div class="row-actions">
          <button class="act-delete" data-id="${c.id}">Delete</button>
        </div>
      </td>
    </tr>
  `).join("");

  wrap.innerHTML = `
    <table class="ship-table">
      <tr><th>Name</th><th>Email</th><th>Added On</th><th>Actions</th></tr>
      ${rows}
    </table>
  `;

  wrap.querySelectorAll(".act-delete").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      if(!confirm("Ye customer account delete karna chahte hain? Unki sab bookings bhi delete ho jayengi.")) return;
      const id = btn.getAttribute("data-id");
      await fetch(`/api/admin/customers/${id}`, { method:"DELETE" });
      loadCustomers();
    });
  });
}

function escapeHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

document.getElementById("addBtn").addEventListener("click", async ()=>{
  const name = document.getElementById("newName").value.trim();
  const email = document.getElementById("newEmail").value.trim();
  const password = document.getElementById("newPassword").value;
  const msgBox = document.getElementById("msgBox");
  msgBox.className = "msg";

  if(!name || !email || !password){
    msgBox.textContent = "Name, email, aur password teeno zaroori hain.";
    msgBox.className = "msg error";
    return;
  }

  const res = await fetch("/api/admin/customers", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ name, email, password })
  });
  const data = await res.json();
  if(!res.ok){
    msgBox.textContent = data.error || "Customer add nahi ho saka";
    msgBox.className = "msg error";
    return;
  }

  msgBox.textContent = `Customer add ho gaya! Login details unhe bhej dein — Email: ${email}`;
  msgBox.className = "msg success";
  document.getElementById("newName").value = "";
  document.getElementById("newEmail").value = "";
  document.getElementById("newPassword").value = "";
  loadCustomers();
});

document.getElementById("logoutBtn").addEventListener("click", async ()=>{
  await fetch("/api/auth/logout", { method:"POST" });
  window.location.href = "/login.html";
});

(async function init(){
  const user = await loadUser();
  if(user) loadCustomers();
})();
</script>
</body>
</html>
