<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Universal Logistics & International</title></head>
<body>
<script>
(async function(){
  try{
    const res = await fetch("/api/auth/me");
    if(!res.ok){ window.location.href = "/login.html"; return; }
    const data = await res.json();
    window.location.href = data.user.role === "admin" ? "/dashboard.html" : "/my-shipments.html";
  }catch(err){
    window.location.href = "/login.html";
  }
})();
</script>
</body>
</html>
