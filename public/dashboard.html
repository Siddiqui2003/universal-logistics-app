<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard — Universal Logistics & International</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  body{background:#f3f3f0;}
  .status-pill{
    display:inline-block; padding:3px 10px; border-radius:20px;
    font-size:11px; font-weight:700; letter-spacing:0.3px;
  }
  .status-Pending{background:#fff3cd; color:#8a6300;}
  .status-Confirmed{background:#d4f5df; color:#1a7d43;}
  .status-Shipped{background:#dbe9ff; color:var(--blue);}
  .status-Cancelled{background:#fdeaea; color:#9c2b2b;}
  .status-select{
    font-size:12px; padding:4px 6px; border-radius:6px; border:1px solid #ccc;
  }
  .nav-links{display:flex; gap:16px; align-items:center;}
  .nav-links a{color:var(--blue); text-decoration:none; font-size:13px; font-weight:600;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">UNIVERSAL <span>LOGISTICS</span> — Admin</div>
  <div class="userinfo">
    <div class="nav-links">
      <a href="/customers.html">Manage Customers</a>
    </div>
    <span id="userName"></span>
    <button id="logoutBtn">Logout</button>
  </div>
</div>

<div class="dash-body">
  <div class="dash-head">
    <h2>All Shipments &amp; Bookings</h2>
    <a href="/form.html" class="btn-primary">+ New Shipment</a>
  </div>

  <div id="listWrap">
    <div class="empty-state">Loading...</div>
  </div>
</div>

<script>
const STATUS_OPTIONS = ["Pending", "Confirmed", "Shipped", "Cancelled"];

async function loadUser(){
  const res = await fetch("/api/auth/me");
  if(!res.ok){ window.location.href = "/login.html"; return null; }
  const data = await res.json();
  if(data.user.role !== "admin"){
    window.location.href = "/booking.html";
    return null;
  }
  document.getElementById("userName").textContent = data.user.name;
  return data.user;
}

async function loadShipments(){
  const res = await fetch("/api/shipments");
  const data = await res.json();
  const wrap = document.getElementById("listWrap");

  if(!data.shipments || data.shipments.length === 0){
    wrap.innerHTML = '<div class="empty-state">Abhi tak koi shipment/booking nahi bani.</div>';
    return;
  }

  const rows = data.shipments.map(s => `
    <tr>
      <td>${s.awbnum || "-"}</td>
      <td>${escapeHtml(s.customerName || "-")}</td>
      <td>${escapeHtml(s.shipperName || "-")}</td>
      <td>${escapeHtml(s.consigneeName || "-")}</td>
      <td>
        <select class="status-select" data-id="${s.id}">
          ${STATUS_OPTIONS.map(opt => `<option value="${opt}" ${opt===s.status?"selected":""}>${opt}</option>`).join("")}
        </select>
      </td>
      <td>${new Date(s.updated_at).toLocaleString()}</td>
      <td>
        <div class="row-actions">
          <a class="act-edit" href="/form.html?id=${s.id}">Edit</a>
          <a class="act-print" href="/print.html?id=${s.id}" target="_blank">Print</a>
          <button class="act-delete" data-id="${s.id}">Delete</button>
        </div>
      </td>
    </tr>
  `).join("");

  wrap.innerHTML = `
    <table class="ship-table">
      <tr>
        <th>AWB #</th>
        <th>Customer</th>
        <th>Shipper</th>
        <th>Consignee</th>
        <th>Status</th>
        <th>Last Updated</th>
        <th>Actions</th>
      </tr>
      ${rows}
    </table>
  `;

  wrap.querySelectorAll(".status-select").forEach(sel=>{
    sel.addEventListener("change", async ()=>{
      const id = sel.getAttribute("data-id");
      const shipRes = await fetch(`/api/shipments/${id}`);
      const shipData = await shipRes.json();
      await fetch(`/api/shipments/${id}`, {
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ ...shipData, status: sel.value })
      });
    });
  });

  wrap.querySelectorAll(".act-delete").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      if(!confirm("Ye shipment delete karna chahte hain?")) return;
      const id = btn.getAttribute("data-id");
      await fetch(`/api/shipments/${id}`, { method:"DELETE" });
      loadShipments();
    });
  });
}

function escapeHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

document.getElementById("logoutBtn").addEventListener("click", async ()=>{
  await fetch("/api/auth/logout", { method:"POST" });
  window.location.href = "/login.html";
});

(async function init(){
  const user = await loadUser();
  if(user) loadShipments();
})();
</script>
</body>
</html>
