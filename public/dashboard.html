<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard — Universal Logistics & International</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/bootstrap.min.css">
<link rel="stylesheet" href="/css/style.css">
<style>
  :root{
    --bs-body-font-family: "Inter", sans-serif;
  }
  body{background:#eef0ed; font-family:"Inter", sans-serif;}

  /* ---------- NAVBAR ---------- */
  .navbar-brand-custom{
    background:linear-gradient(120deg, var(--blue) 0%, #123a63 55%, #0a2340 100%);
    position:relative; overflow:hidden;
  }
  .navbar-brand-custom::before{
    content:""; position:absolute; inset:0;
    background:radial-gradient(circle at 90% -30%, rgba(200,149,44,0.35), transparent 55%);
    pointer-events:none;
  }
  .brand-logo{
    width:44px; height:44px; border-radius:10px; overflow:hidden;
    background:#fff; display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 10px rgba(0,0,0,.25); flex-shrink:0;
  }
  .brand-logo img{width:100%; height:100%; object-fit:cover;}
  .brand-text .name{font-family:"Playfair Display", serif; font-weight:800; font-size:17px; color:#fff; line-height:1.1;}
  .brand-text .tag{font-size:10.5px; color:#cfe0f5; letter-spacing:0.4px;}
  .navbar .nav-link{color:#e8eefc !important; font-weight:600; font-size:13.5px;}
  .navbar .nav-link:hover{color:#fff !important;}
  .avatar-circle{
    width:32px; height:32px; border-radius:50%; background:var(--orange); color:#1c1300;
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12.5px;
  }
  .btn-logout{
    background:rgba(255,255,255,.14); color:#fff; border:1px solid rgba(255,255,255,.3);
  }
  .btn-logout:hover{background:rgba(255,255,255,.24); color:#fff;}

  /* ---------- STAT CARDS ---------- */
  .stat-card{
    border:none; border-radius:12px; box-shadow:0 6px 20px rgba(20,30,50,.08);
    border-top:3px solid var(--blue);
  }
  .stat-card .stat-num{font-family:"Playfair Display", serif; font-size:26px; font-weight:800; color:var(--ink);}
  .stat-card .stat-lbl{font-size:11px; color:var(--muted); letter-spacing:0.3px; text-transform:uppercase;}
  .stat-card.total{border-top-color:var(--blue);}
  .stat-card.pending{border-top-color:#c8952c;}
  .stat-card.confirmed{border-top-color:#1a7d43;}
  .stat-card.shipped{border-top-color:#1a56c4;}
  .stat-card.cancelled{border-top-color:#9c2b2b;}

  /* ---------- SECTION HEADING ---------- */
  .section-heading{font-family:"Playfair Display", serif; color:var(--ink); font-weight:700;}
  .btn-brand{background:var(--blue); border-color:var(--blue); color:#fff; font-weight:700;}
  .btn-brand:hover{background:#092a4d; border-color:#092a4d; color:#fff;}
  .btn-brand-outline{border-color:var(--blue); color:var(--blue); font-weight:600;}
  .btn-brand-outline:hover{background:var(--blue); color:#fff;}
  .btn-excel-brand{background:#1a7d43; border-color:#1a7d43; color:#fff; font-weight:700;}
  .btn-excel-brand:hover{background:#146334; border-color:#146334; color:#fff;}

  /* ---------- FILTER CARD ---------- */
  .filter-card{border:none; border-radius:12px; box-shadow:0 1px 8px rgba(0,0,0,.06);}
  .filter-card label{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.3px; font-weight:600;}

  /* ---------- TABLE ---------- */
  .shipment-table thead th{
    background:#f7f7f5; font-size:11px; text-transform:uppercase; letter-spacing:0.3px;
    color:var(--muted); font-weight:700; border-bottom:2px solid #e5e5e0; white-space:nowrap;
  }
  .shipment-table td{vertical-align:middle; font-size:13px;}
  .awb-main{font-weight:700; color:var(--ink); font-size:13px;}
  .track-sub{font-size:10.5px; color:var(--muted);}
  .customer-chip{display:inline-flex; align-items:center; gap:6px; font-weight:600; font-size:12.5px;}
  .customer-dot{
    width:22px; height:22px; border-radius:50%; background:var(--blue); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; flex-shrink:0;
  }
  .datetime-cell{font-size:11px; line-height:1.5; white-space:nowrap;}
  .datetime-cell b{color:var(--ink); font-weight:600;}
  .status-select-sm{font-size:12px; min-width:120px;}
  .action-btns .btn{font-size:11.5px; padding:3px 8px;}
  .empty-state{text-align:center; padding:50px 20px; color:var(--muted);}
</style>
</head>
<body>

<!-- ===================== NAVBAR ===================== -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-brand-custom py-2">
  <div class="container-fluid px-3 px-lg-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/dashboard.html">
      <span class="brand-logo"><img id="logoImg" alt="Universal Logistics & International"></span>
      <span class="brand-text">
        <span class="d-block name">Universal Logistics</span>
        <span class="d-block tag">Admin Control Panel</span>
      </span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navContent">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3 mt-3 mt-lg-0">
        <li class="nav-item"><a class="nav-link" href="/customers.html">Manage Customers</a></li>
        <li class="nav-item d-flex align-items-center gap-2 mt-2 mt-lg-0">
          <span class="avatar-circle" id="avatarLetter"></span>
          <span class="text-white small fw-semibold" id="userName"></span>
        </li>
        <li class="nav-item mt-2 mt-lg-0">
          <button class="btn btn-sm btn-logout w-100" id="logoutBtn">Logout</button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid px-3 px-lg-4" style="max-width:1240px;">

  <!-- ===================== STAT CARDS ===================== -->
  <div class="row g-3 mt-1 mb-4">
    <div class="col-6 col-md-4 col-lg">
      <div class="card stat-card total h-100">
        <div class="card-body py-3">
          <div class="stat-num" id="statTotal">0</div>
          <div class="stat-lbl">Total Shipments</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-4 col-lg">
      <div class="card stat-card pending h-100">
        <div class="card-body py-3">
          <div class="stat-num" id="statPending">0</div>
          <div class="stat-lbl">Pending</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-4 col-lg">
      <div class="card stat-card confirmed h-100">
        <div class="card-body py-3">
          <div class="stat-num" id="statConfirmed">0</div>
          <div class="stat-lbl">Confirmed</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-4 col-lg">
      <div class="card stat-card shipped h-100">
        <div class="card-body py-3">
          <div class="stat-num" id="statShipped">0</div>
          <div class="stat-lbl">Shipped</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-4 col-lg">
      <div class="card stat-card cancelled h-100">
        <div class="card-body py-3">
          <div class="stat-num" id="statCancelled">0</div>
          <div class="stat-lbl">Cancelled</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===================== HEADER ROW ===================== -->
  <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
    <h2 class="section-heading mb-0 fs-4">All Shipments &amp; Bookings</h2>
    <a href="/form.html" class="btn btn-brand">+ New Shipment</a>
  </div>

  <!-- ===================== FILTER BAR ===================== -->
  <div class="card filter-card mb-3">
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-12 col-sm-6 col-lg-3">
          <label class="form-label mb-1">Search</label>
          <input type="text" class="form-control" id="fSearch" placeholder="AWB, tracking #, name...">
        </div>
        <div class="col-6 col-sm-6 col-lg-2">
          <label class="form-label mb-1">Destination</label>
          <select class="form-select" id="fDestination"><option value="">All</option></select>
        </div>
        <div class="col-6 col-sm-6 col-lg-2">
          <label class="form-label mb-1">Service</label>
          <select class="form-select" id="fService"><option value="">All</option></select>
        </div>
        <div class="col-6 col-sm-6 col-lg-2">
          <label class="form-label mb-1">Status</label>
          <select class="form-select" id="fStatus">
            <option value="">All</option>
            <option value="Pending">Pending</option>
            <option value="Confirmed">Confirmed</option>
            <option value="Shipped">Shipped</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>
        <div class="col-12 col-lg-3 d-flex gap-2">
          <button class="btn btn-brand flex-fill" id="showNowBtn">Show Now</button>
          <button class="btn btn-excel-brand flex-fill" id="excelBtn">⬇ Excel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===================== TABLE ===================== -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-0">
      <div id="listWrap">
        <div class="empty-state">Loading...</div>
      </div>
    </div>
  </div>

</div>

<!-- ===================== DELETE CONFIRM MODAL ===================== -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Delete Shipment?</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Ye shipment permanently delete ho jayegi. Ye action wapas nahi ho sakta.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- ===================== TOAST ===================== -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="statusToast" class="toast align-items-center text-white bg-success border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg">Updated</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="/js/bootstrap.bundle.min.js"></script>
<script src="/js/templates.js"></script>
<script>
document.getElementById("logoImg").src = LOGO_DATA_URI;

const STATUS_OPTIONS = ["Pending", "Confirmed", "Shipped", "Cancelled"];
const STATUS_BADGE_CLASS = {
  Pending: "bg-warning text-dark",
  Confirmed: "bg-success",
  Shipped: "bg-primary",
  Cancelled: "bg-danger"
};
let allShipments = [];
let pendingDeleteId = null;

const deleteModal = new bootstrap.Modal(document.getElementById("deleteModal"));
const statusToastEl = document.getElementById("statusToast");
const statusToast = new bootstrap.Toast(statusToastEl, { delay: 2200 });

function showToast(msg, isError){
  document.getElementById("toastMsg").textContent = msg;
  statusToastEl.classList.toggle("bg-success", !isError);
  statusToastEl.classList.toggle("bg-danger", !!isError);
  statusToast.show();
}

async function loadUser(){
  const res = await fetch("/api/auth/me");
  if(!res.ok){ window.location.href = "/login.html"; return null; }
  const data = await res.json();
  if(data.user.role !== "admin"){
    window.location.href = "/my-shipments.html";
    return null;
  }
  document.getElementById("userName").textContent = data.user.name;
  document.getElementById("avatarLetter").textContent = data.user.name.charAt(0).toUpperCase();
  return data.user;
}

function updateStats(shipments){
  const counts = { Pending:0, Confirmed:0, Shipped:0, Cancelled:0 };
  shipments.forEach(s => { if(counts[s.status] !== undefined) counts[s.status]++; });
  document.getElementById("statTotal").textContent = shipments.length;
  document.getElementById("statPending").textContent = counts.Pending;
  document.getElementById("statConfirmed").textContent = counts.Confirmed;
  document.getElementById("statShipped").textContent = counts.Shipped;
  document.getElementById("statCancelled").textContent = counts.Cancelled;
}

function populateFilterOptions(shipments){
  const destSel = document.getElementById("fDestination");
  const svcSel = document.getElementById("fService");
  const destVal = destSel.value, svcVal = svcSel.value;

  const destinations = [...new Set(shipments.map(s => s.destination).filter(Boolean))].sort();
  const services = [...new Set(shipments.map(s => s.service).filter(Boolean))].sort();

  destSel.innerHTML = '<option value="">All</option>' + destinations.map(d => `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join("");
  svcSel.innerHTML = '<option value="">All</option>' + services.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join("");

  destSel.value = destVal;
  svcSel.value = svcVal;
}

function applyFilters(shipments){
  const search = document.getElementById("fSearch").value.trim().toLowerCase();
  const destination = document.getElementById("fDestination").value;
  const service = document.getElementById("fService").value;
  const status = document.getElementById("fStatus").value;

  return shipments.filter(s => {
    if(destination && s.destination !== destination) return false;
    if(service && s.service !== service) return false;
    if(status && s.status !== status) return false;
    if(search){
      const haystack = [s.awbnum, s.trackingNo, s.shipperName, s.consigneeName, s.customerName].join(" ").toLowerCase();
      if(haystack.indexOf(search) === -1) return false;
    }
    return true;
  });
}

async function loadShipments(){
  const wrap = document.getElementById("listWrap");
  let data;
  try{
    const res = await fetch("/api/shipments");
    if(!res.ok){
      let errMsg = "Shipments load nahi ho sakin (server error).";
      try{ const errData = await res.json(); errMsg = errData.error || errMsg; }catch(e){}
      wrap.innerHTML = `<div class="empty-state">${escapeHtml(errMsg)}</div>`;
      return;
    }
    data = await res.json();
  }catch(err){
    wrap.innerHTML = '<div class="empty-state">Network error — page reload kar ke dobara try karein.</div>';
    return;
  }

  allShipments = data.shipments || [];
  updateStats(allShipments);
  populateFilterOptions(allShipments);
  renderTable();
}

function renderTable(){
  const wrap = document.getElementById("listWrap");
  const shipments = applyFilters(allShipments);

  if(shipments.length === 0){
    wrap.innerHTML = '<div class="empty-state">Koi shipment is filter se match nahi hui.</div>';
    return;
  }

  const rows = shipments.map(s => `
    <tr>
      <td>
        <div class="awb-main">${escapeHtml(s.awbnum || "(no AWB)")}</div>
        ${s.trackingNo ? `<div class="track-sub">Track #${escapeHtml(s.trackingNo)}</div>` : ""}
      </td>
      <td>
        <span class="customer-chip">
          <span class="customer-dot">${escapeHtml((s.customerName||"?").charAt(0).toUpperCase())}</span>
          ${escapeHtml(s.customerName || "-")}
        </span>
      </td>
      <td>${escapeHtml(s.shipperName || "-")}</td>
      <td>${escapeHtml(s.consigneeName || "-")}</td>
      <td>${escapeHtml(s.service || "-")}</td>
      <td>
        <select class="form-select form-select-sm status-select-sm" data-id="${s.id}">
          ${STATUS_OPTIONS.map(opt => `<option value="${opt}" ${opt===s.status?"selected":""}>${opt}</option>`).join("")}
        </select>
      </td>
      <td class="datetime-cell">
        <div><b>Created:</b> ${new Date(s.created_at).toLocaleString()}</div>
        <div><b>Updated:</b> ${new Date(s.updated_at).toLocaleString()}</div>
      </td>
      <td>
        <div class="d-flex flex-column gap-1 action-btns">
          <a class="btn btn-sm btn-brand-outline" href="/form.html?id=${s.id}">Edit</a>
          <a class="btn btn-sm btn-outline-success" href="/print.html?id=${s.id}&only=bill" target="_blank">Print AWB</a>
          <a class="btn btn-sm btn-outline-success" href="/print.html?id=${s.id}&only=invoice" target="_blank">Print Invoice</a>
          <button class="btn btn-sm btn-outline-danger btn-delete" data-id="${s.id}">Delete</button>
        </div>
      </td>
    </tr>
  `).join("");

  wrap.innerHTML = `
    <div class="table-responsive">
      <table class="table shipment-table mb-0 align-middle">
        <thead>
          <tr>
            <th>Consig. #</th>
            <th>Customer</th>
            <th>Shipper</th>
            <th>Consignee</th>
            <th>Service</th>
            <th>Status</th>
            <th>Date-Time</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;

  wrap.querySelectorAll(".status-select-sm").forEach(sel=>{
    sel.addEventListener("change", async ()=>{
      const id = sel.getAttribute("data-id");
      const shipRes = await fetch(`/api/shipments/${id}`);
      const shipData = await shipRes.json();
      await fetch(`/api/shipments/${id}`, {
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ ...shipData, status: sel.value })
      });
      showToast("Status updated");
      loadShipments();
    });
  });

  wrap.querySelectorAll(".btn-delete").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      pendingDeleteId = btn.getAttribute("data-id");
      deleteModal.show();
    });
  });
}

document.getElementById("confirmDeleteBtn").addEventListener("click", async ()=>{
  if(!pendingDeleteId) return;
  await fetch(`/api/shipments/${pendingDeleteId}`, { method:"DELETE" });
  deleteModal.hide();
  showToast("Shipment deleted");
  pendingDeleteId = null;
  loadShipments();
});

function escapeHtml(s){
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function exportToExcel(){
  const shipments = applyFilters(allShipments);
  const headers = ["Consignment #","Tracking #","Customer","Shipper","Consignee","Service","Status","Created","Updated"];
  const rows = shipments.map(s => [
    s.awbnum || "", s.trackingNo || "", s.customerName || "", s.shipperName || "",
    s.consigneeName || "", s.service || "", s.status || "",
    new Date(s.created_at).toLocaleString(), new Date(s.updated_at).toLocaleString()
  ]);

  function csvEscape(val){
    val = String(val === undefined || val === null ? "" : val);
    if(/[",\n]/.test(val)) return '"' + val.replace(/"/g, '""') + '"';
    return val;
  }

  const csv = [headers].concat(rows).map(function(row){ return row.map(csvEscape).join(","); }).join("\r\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "shipments-" + new Date().toISOString().slice(0,10) + ".csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("Excel file downloaded");
}

document.getElementById("showNowBtn").addEventListener("click", renderTable);
document.getElementById("excelBtn").addEventListener("click", exportToExcel);
document.getElementById("fSearch").addEventListener("keydown", (e)=>{ if(e.key === "Enter") renderTable(); });

document.getElementById("logoutBtn").addEventListener("click", async ()=>{
  await fetch("/api/auth/logout", { method:"POST" });
  window.location.href = "/login.html";
});

(async function init(){
  const user = await loadUser();
  if(user) loadShipments();
})();
</script>
</body>
</html>
